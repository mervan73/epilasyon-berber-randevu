<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yönetici Kaydı</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2b3d,#1b4a6b,#2d7a9a);padding:20px}
.card{background:#fff;border-radius:24px;padding:44px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(0,0,0,.4)}
.logo{width:68px;height:68px;background:linear-gradient(135deg,#0f2b3d,#1b4a6b);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px;box-shadow:0 8px 24px rgba(15,43,61,.4)}
h1{font-size:1.55rem;font-weight:800;color:#0f2b3d;text-align:center;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;text-align:center;margin-bottom:22px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:5px}
.field input{width:100%;padding:11px 13px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;color:#1e293b;outline:none;transition:.2s;background:#fff}
.field input:focus{border-color:#1b4a6b;box-shadow:0 0 0 3px rgba(27,74,107,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#0f2b3d,#1b4a6b);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;transition:.2s;box-shadow:0 4px 14px rgba(15,43,61,.3)}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.err{background:#fef2f2;border:1.5px solid #fecaca;color:#dc2626}
.suc{background:#f0fdf4;border:1.5px solid #bbf7d0;color:#15803d}
.info-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;padding:10px 13px;font-size:12.5px;color:#0369a1;margin-bottom:16px;line-height:1.5}
.footer{text-align:center;margin-top:18px;font-size:13px;color:#64748b}
.footer a{color:#1b4a6b;font-weight:700;text-decoration:none}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">👑</div>
  <h1>Yönetici Kaydı</h1>
  <p class="sub">Süper Admin hesabı oluşturun</p>

  <div class="info-box">
    🔒 Bu sayfa yalnızca <strong>Süper Admin</strong> hesabı oluşturmak içindir.<br>
    İşletme sahipleri <a href="http://localhost:5002/giris" style="color:#0369a1;font-weight:700">işletme panelinden</a> kayıt olmalıdır.
  </div>

  <div id="kayit-err" class="alert err"></div>
  <div id="kayit-suc" class="alert suc"></div>

  <div class="field"><label>Ad Soyad *</label>
    <input type="text" id="ad" placeholder="Adınız ve soyadınız">
  </div>
  <div class="row2">
    <div class="field"><label>E-posta *</label>
      <input type="email" id="email" placeholder="ornek@email.com">
    </div>
    <div class="field"><label>Telefon</label>
      <input type="tel" id="tel" placeholder="0555 555 55 55">
    </div>
  </div>
  <div class="row2">
    <div class="field"><label>Şifre *</label>
      <input type="password" id="sifre" placeholder="En az 6 karakter">
    </div>
    <div class="field"><label>Şifre Tekrar *</label>
      <input type="password" id="sifre2" placeholder="Şifrenizi tekrarlayın">
    </div>
  </div>
  <div class="field"><label>🔒 Admin Kayıt Kodu *</label>
    <input type="password" id="kod" placeholder="Yöneticiden alınan kod">
  </div>

  <button class="btn" id="btn" onclick="kayit()">👑 Süper Admin Hesabı Oluştur</button>

  <div class="footer">
    Hesabın var mı? <a href="/giris">Giriş Yap</a> &nbsp;·&nbsp;
    <a href="http://localhost:5002/giris">İşletme Paneli →</a>
  </div>
</div>

<script>
function showAlert(id, type, msg) {
  var el = document.getElementById(id);
  el.className = 'alert ' + type;
  el.textContent = (type === 'err' ? '⚠️ ' : '✅ ') + msg;
  el.style.display = 'block';
}
function hideAll() {
  ['kayit-err','kayit-suc'].forEach(function(id){ document.getElementById(id).style.display='none'; });
}

async function kayit() {
  var ad     = document.getElementById('ad').value.trim();
  var email  = document.getElementById('email').value.trim();
  var tel    = document.getElementById('tel').value.trim();
  var sifre  = document.getElementById('sifre').value;
  var sifre2 = document.getElementById('sifre2').value;
  var kod    = document.getElementById('kod').value.trim();
  var btn    = document.getElementById('btn');
  hideAll();
  if (!ad)             { showAlert('kayit-err','err','Ad Soyad zorunludur!'); return; }
  if (!email)          { showAlert('kayit-err','err','E-posta zorunludur!'); return; }
  if (sifre.length < 6){ showAlert('kayit-err','err','Şifre en az 6 karakter olmalı!'); return; }
  if (sifre !== sifre2){ showAlert('kayit-err','err','Şifreler eşleşmiyor!'); return; }
  if (!kod)            { showAlert('kayit-err','err','Admin kayıt kodu zorunludur!'); return; }
  btn.innerHTML = '<span class="spin"></span>Oluşturuluyor...';
  btn.disabled = true;
  try {
    var res = await fetch('/api/admin/kayit', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ad:ad, email:email, telefon:tel, sifre:sifre, admin_kodu:kod, isletme_id:null})
    });
    var data = await res.json();
    if (data.success) {
      showAlert('kayit-suc','suc', data.message + ' Şimdi giriş yapabilirsiniz.');
      setTimeout(function(){ window.location.href = '/giris'; }, 2200);
    } else {
      showAlert('kayit-err','err', data.message || 'Kayıt başarısız!');
    }
  } catch(e) {
    showAlert('kayit-err','err','Sunucuya bağlanılamadı! (' + e.message + ')');
  } finally {
    btn.innerHTML = '👑 Süper Admin Hesabı Oluştur';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
