<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yönetici Girişi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a1f2c 0%, #0f2b3d 40%, #1b4a6b 100%);
    position: relative;
    overflow: hidden;
  }

  /* Arka plan dekorasyon */
  body::before, body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    opacity: .06;
    background: #fff;
  }
  body::before { width: 500px; height: 500px; top: -150px; right: -100px; }
  body::after  { width: 350px; height: 350px; bottom: -80px; left: -80px; }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 28px 70px rgba(0,0,0,.35);
    position: relative;
    z-index: 1;
  }

  .logo {
    width: 70px; height: 70px;
    background: linear-gradient(135deg, #0f2b3d, #1b4a6b);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px; color: #fff;
    box-shadow: 0 8px 24px rgba(15,43,61,.35);
  }

  h1 { font-size: 1.65rem; font-weight: 800; color: #0f2b3d; text-align: center; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 14px; text-align: center; margin-bottom: 32px; }

  .field { margin-bottom: 16px; }
  .field label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 7px;
  }
  .field label i { color: #1b4a6b; font-size: 13px; }
  .field input {
    width: 100%; padding: 12px 16px;
    border: 2px solid #e2e8f0; border-radius: 12px;
    font-size: 15px; font-family: inherit;
    transition: .2s; color: #1e293b;
  }
  .field input:focus { outline: none; border-color: #1b4a6b; box-shadow: 0 0 0 3px rgba(27,74,107,.12); }

  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #0f2b3d, #1b4a6b);
    color: #fff; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; display: flex; align-items: center;
    justify-content: center; gap: 8px;
    margin-top: 4px; transition: .2s;
    box-shadow: 0 4px 14px rgba(15,43,61,.35);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(15,43,61,.42); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .7; cursor: not-allowed; transform: none; }

  .err {
    background: #fef2f2; border: 1.5px solid #fecaca;
    color: #dc2626; padding: 10px 14px;
    border-radius: 10px; font-size: 13px;
    margin-bottom: 16px; display: none;
    align-items: center; gap: 7px;
  }

  .bottom {
    text-align: center; margin-top: 24px;
    font-size: 13.5px; color: #64748b;
  }
  .bottom a {
    color: #1b4a6b; font-weight: 700;
    text-decoration: none; margin-left: 4px;
  }
  .bottom a:hover { text-decoration: underline; }

  .spinner {
    width: 17px; height: 17px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .65s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg) } }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><i class="fas fa-crown"></i></div>
  <h1>Yönetici Girişi</h1>
  <p class="sub">Devam etmek için hesabınıza giriş yapın</p>

  <div class="err" id="errBox">
    <i class="fas fa-exclamation-circle"></i>
    <span id="errMsg"></span>
  </div>

  <div class="field">
    <label><i class="fas fa-envelope"></i> E-posta Adresi</label>
    <input type="email" id="email" placeholder="admin@example.com" onkeydown="if(event.key==='Enter') giris()">
  </div>
  <div class="field">
    <label><i class="fas fa-lock"></i> Şifre</label>
    <input type="password" id="sifre" placeholder="••••••••" onkeydown="if(event.key==='Enter') giris()">
  </div>

  <button class="btn" id="btn" onclick="giris()">
    <i class="fas fa-sign-in-alt"></i> Giriş Yap
  </button>

  <div class="bottom">
    Hesabınız yok mu?
    <a href="/kayit">Yeni Admin Kaydı</a>
  </div>
</div>

<script>
async function giris() {
  const email = document.getElementById('email').value.trim();
  const sifre = document.getElementById('sifre').value;
  const btn   = document.getElementById('btn');
  const err   = document.getElementById('errBox');

  if (!email || !sifre) { showErr('Email ve şifre zorunludur!'); return; }

  btn.innerHTML = '<div class="spinner"></div> Giriş yapılıyor...';
  btn.disabled  = true;
  err.style.display = 'none';

  try {
    const res  = await fetch('/api/admin/giris', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, sifre })
    });
    const data = await res.json();

    if (res.ok) {
      window.location.href = '/';
    } else {
      showErr(data.message || 'Giriş başarısız!');
    }
  } catch {
    showErr('Sunucuya bağlanılamadı!');
  } finally {
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Giriş Yap';
    btn.disabled  = false;
  }
}

function showErr(msg) {
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errBox').style.display = 'flex';
}
</script>
</body>
</html>
